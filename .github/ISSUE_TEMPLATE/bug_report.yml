name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? How can we reproduce the issue? What was expected to happen?
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Device Type
      description: Which device area is affected?
      options:
        - Charger
        - Car
        - Battery
        - Pool
        - Home / Solver
        - Boiler
        - Radiator
        - Climate
        - Other
    validations:
      required: true


  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output (debug level preferred)
      render: text
